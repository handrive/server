# Local development/testing Docker Compose
# Usage: docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: handrive
      POSTGRES_PASSWORD: handrive
      POSTGRES_DB: handrive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handrive"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      HOST: "0.0.0.0"
      PORT: "3001"
      DATABASE_URL: postgres://handrive:handrive@postgres:5432/handrive
      DB_POOL_SIZE: "5"
      JWT_SECRET: "test-jwt-secret-at-least-32-characters-long"
      JWT_ACCESS_TTL_SECS: "900"
      JWT_REFRESH_TTL_SECS: "604800"
      NATS_URL: nats://nats:4222
      NATS_ACCOUNT_SIGNING_KEY: ${NATS_ACCOUNT_SIGNING_KEY}
      NATS_ACCOUNT_PUBLIC_KEY: ${NATS_ACCOUNT_PUBLIC_KEY}
      GOOGLE_CLIENT_ID: "test-client-id"
      GOOGLE_CLIENT_SECRET: "test-client-secret"
      GOOGLE_REDIRECT_URI: "http://localhost:3001/api/auth/google/callback"
      RESEND_API_KEY: "test-resend-key"
      RESEND_FROM: "test@example.com"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:1420"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
