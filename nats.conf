# NATS Server Configuration for Handrive

server_name: handrive-nats

# ==============================================================================
# Client Port (TLS)
# ==============================================================================

port: 4222

tls {
  cert_file: "/certs/server.crt"
  key_file: "/certs/server.key"
}

# ==============================================================================
# Monitoring
# ==============================================================================

# HTTP monitoring (localhost only)
http_port: 8222

# ==============================================================================
# Logging & Limits
# ==============================================================================

debug: false
trace: false
logtime: true

max_payload: 8MB
max_pending: 64MB
max_connections: 8000

ping_interval: "2m"
ping_max: 2
write_deadline: "10s"
